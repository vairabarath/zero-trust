root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/controller ."
  bin = "./tmp/controller"
  include_ext = ["go"]
  exclude_dir = ["tmp", "ca", "vendor", "gen"]
  delay = 1000
  kill_delay = "500ms"
  send_interrupt = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
